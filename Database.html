<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Gaji OMP</title>
    
    <script src="auth.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff007f; 
            --dark-bg: #030303; 
            --card-bg: rgba(26, 26, 26, 0.9); 
            --text: #ffffff;
            --neon-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'EB Garamond', serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* ═══ EFEK ANIMASI LATAR BELAKANG ═══ */
        .bg-marquee {
            position: fixed;
            top: 200px;
            left: 0;
            width: 100%;
            white-space: nowrap;
            font-size: 80px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            color: rgba(255, 0, 127, 0.04);
            text-transform: uppercase;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: -2;
            animation: move-text 40s linear infinite;
        }

        @keyframes move-text {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, var(--pink), rgba(0,0,0,0));
            background-size: 300px 300px;
            z-index: -1;
            animation: stars-falling 25s linear infinite;
            opacity: 0.3;
        }

        @keyframes stars-falling {
            from { transform: translateY(0); }
            to { transform: translateY(1000px); }
        }

        /* ═══ HEADER & NAV ═══ */
        header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            border-bottom: 2px solid var(--pink);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
            position: relative; z-index: 10;
        }

        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .side-logo { height: 60px; filter: drop-shadow(0 0 8px var(--pink)); }
        h1 { font-family: 'Playfair Display', serif; color: var(--pink); margin: 0; letter-spacing: 2px; font-size: 28px; text-shadow: 0 0 10px var(--pink); }

        nav { background: #111; padding: 12px 0; border-bottom: 1px solid #333; text-align: center; position: sticky; top: 0; z-index: 100; }
        .nav-inner { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-inner a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .nav-inner a:hover, .nav-inner a.active { color: var(--pink); font-weight: bold; border-bottom: 1px solid var(--pink); }

        /* TOMBOL LOGOUT NEON */
        .btn-logout {
            color: #ff007f !important;
            font-weight: bold !important;
            border: 2px solid #ff007f !important;
            padding: 4px 12px !important;
            border-radius: 20px !important;
            margin-left: 10px !important;
            text-shadow: 0 0 5px #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            transition: all 0.4s ease !important;
            animation: neon-pulse-btn 2s infinite alternate;
        }

        @keyframes neon-pulse-btn {
            from { box-shadow: 0 0 5px rgba(255, 0, 127, 0.4); }
            to { box-shadow: 0 0 15px rgba(255, 0, 127, 0.8); }
        }

        /* ═══ MAIN CONTENT ═══ */
        main { padding: 20px; max-width: 1100px; margin: auto; position: relative; z-index: 5; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 24px; text-align: center; color: var(--pink); margin: 30px 0; text-transform: uppercase; }

        .table-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th { background: #000; color: var(--pink); padding: 15px 5px; text-transform: uppercase; font-size: 11px; border-bottom: 2px solid var(--pink); }
        td { padding: 12px 5px; border-bottom: 1px solid #222; color: #ddd; }
        tr:hover td { background: rgba(255, 0, 127, 0.1); color: #fff; text-shadow: 0 0 5px var(--pink); }

        .lvl-bold { font-weight: bold; color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }
        .koin-bold { color: #ffeb3b; font-weight: bold; }
        .usd-highlight { color: #2ecc71; font-weight: bold; }

        footer { text-align: center; padding: 40px; color: #555; font-size: 12px; border-top: 1px solid #222; margin-top: 40px; }
    </style>
</head>

    <nav>

            <a href="support.html">Contact Support</a>

</html>
